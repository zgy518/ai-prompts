<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  body {
    margin: 0; padding: 0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #e2e8f0;
  }
  .cover {
    width: 800px; height: 600px;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 60px; box-sizing: border-box;
    position: relative; overflow: hidden;
  }
  /* 装饰 */
  .cover::before {
    content: ''; position: absolute; top: -80px; right: -80px;
    width: 280px; height: 280px;
    border: 2px solid rgba(14, 165, 233, 0.15); border-radius: 50%;
  }
  .cover::after {
    content: ''; position: absolute; bottom: -60px; left: -60px;
    width: 200px; height: 200px;
    border: 2px solid rgba(34, 197, 94, 0.12); border-radius: 50%;
  }
  .accent-line {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #2563eb, #0ea5e9, #22c55e);
  }
  /* 内容 */
  .icon-row {
    font-size: 36px; margin-bottom: 20px; position: relative; z-index: 1;
    letter-spacing: 8px;
  }
  h1 {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    font-size: 42px; font-weight: 900; color: #ffffff;
    margin: 0 0 16px 0; text-align: center; position: relative; z-index: 1;
    line-height: 1.3;
  }
  .highlight {
    background: linear-gradient(90deg, #0ea5e9, #22c55e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    font-size: 18px; color: #94a3b8; margin-bottom: 24px;
    text-align: center; position: relative; z-index: 1;
  }
  .badge-row {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    position: relative; z-index: 1; margin-bottom: 28px;
  }
  .badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #cbd5e1; padding: 6px 16px; border-radius: 20px;
    font-size: 13px; font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  }
  .footer-text {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    font-size: 13px; color: #64748b; position: relative; z-index: 1;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="accent-line"></div>
  <div class="icon-row">&#129302;</div>
  <h1>200个AI提示词<br><span class="highlight">从入门到精通</span></h1>
  <p class="subtitle">覆盖写作&thinsp;&middot;&thinsp;编程&thinsp;&middot;&thinsp;学习&thinsp;&middot;&thinsp;办公 4 大场景</p>
  <div class="badge-row">
    <span class="badge">ChatGPT</span>
    <span class="badge">Claude</span>
    <span class="badge">Kimi</span>
    <span class="badge">通义千问</span>
    <span class="badge">豆包</span>
  </div>
  <p class="footer-text">200条实测中文提示词 &middot; 含方法论讲解 &middot; 直接复制就能用</p>
</div>
</body>
</html>
