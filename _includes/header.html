<header class="site-header">
  <div class="container header-inner">
    <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>

    <nav class="site-nav" id="siteNav">
      {% for link in site.nav %}
        {% if link.url contains 'http' %}
          <a href="{{ link.url }}" class="nav-link nav-cta" target="_blank" rel="noopener">{{ link.title }}</a>
        {% else %}
          <a href="{{ link.url | relative_url }}" class="nav-link">{{ link.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="切换暗色模式" title="切换暗色模式">
      <span class="theme-icon-light">☀️</span>
      <span class="theme-icon-dark">🌙</span>
    </button>

    <button class="menu-toggle" id="menuToggle" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
