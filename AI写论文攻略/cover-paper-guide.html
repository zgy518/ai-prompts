<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; }
  .cover {
    width: 800px; height: 600px;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #16213e 70%, #0f3460 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    position: relative; overflow: hidden;
  }
  .cover::before {
    content: ''; position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 70%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(147,112,219,0.1) 0%, transparent 50%);
  }
  .accent-line {
    position: absolute; top: 40px; left: 50px; right: 50px;
    height: 3px;
    background: linear-gradient(90deg, #ffd700, #daa520, #b8860b, #daa520, #ffd700);
    border-radius: 2px;
  }
  .accent-line.bottom {
    top: auto; bottom: 40px;
  }
  .icon-row {
    display: flex; gap: 40px; margin-bottom: 30px; position: relative; z-index: 1;
  }
  .icon-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .icon-circle {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: #fff;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .icon-circle.writing { background: linear-gradient(135deg, #667eea, #764ba2); }
  .icon-circle.search { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .icon-circle.structure { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .icon-circle.defense { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .icon-label { color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 1px; }
  .title {
    position: relative; z-index: 1;
    font-size: 44px; font-weight: 900; color: #fff;
    letter-spacing: 4px; margin-bottom: 12px;
    text-shadow: 0 2px 20px rgba(255,215,0,0.3);
  }
  .title .gold { color: #ffd700; }
  .subtitle {
    position: relative; z-index: 1;
    font-size: 20px; color: rgba(255,255,255,0.8);
    letter-spacing: 3px; margin-bottom: 30px;
    font-weight: 300;
  }
  .divider {
    width: 200px; height: 1px; background: rgba(255,215,0,0.4);
    margin: 0 auto 30px; position: relative; z-index: 1;
  }
  .features {
    position: relative; z-index: 1;
    display: flex; gap: 30px; margin-bottom: 30px;
  }
  .feature {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 14px 20px;
    text-align: center;
  }
  .feature .num {
    font-size: 28px; font-weight: 900; color: #ffd700;
    display: block;
  }
  .feature .label {
    font-size: 13px; color: rgba(255,255,255,0.65);
    margin-top: 4px; letter-spacing: 1px;
  }
  .badge-row {
    position: relative; z-index: 1;
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .badge {
    padding: 6px 16px; border-radius: 20px;
    font-size: 12px; color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.15);
    letter-spacing: 1px;
  }
  .bottom-text {
    position: absolute; bottom: 65px; z-index: 1;
    font-size: 12px; color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="accent-line"></div>

  <div class="icon-row">
    <div class="icon-item">
      <div class="icon-circle writing">📝</div>
      <span class="icon-label">选题写作</span>
    </div>
    <div class="icon-item">
      <div class="icon-circle search">📚</div>
      <span class="icon-label">文献综述</span>
    </div>
    <div class="icon-item">
      <div class="icon-circle structure">🔬</div>
      <span class="icon-label">研究方法</span>
    </div>
    <div class="icon-item">
      <div class="icon-circle defense">🎓</div>
      <span class="icon-label">答辩通关</span>
    </div>
  </div>

  <div class="title">
    AI<span class="gold">写论文</span>攻略
  </div>
  <div class="subtitle">从选题到答辩 · 全流程AI辅助指南</div>
  <div class="divider"></div>

  <div class="features">
    <div class="feature">
      <span class="num">46</span>
      <span class="label">条专用提示词</span>
    </div>
    <div class="feature">
      <span class="num">6</span>
      <span class="label">章方法论</span>
    </div>
    <div class="feature">
      <span class="num">4</span>
      <span class="label">大AI通用</span>
    </div>
  </div>

  <div class="badge-row">
    <span class="badge">ChatGPT</span>
    <span class="badge">Claude</span>
    <span class="badge">Kimi</span>
    <span class="badge">通义千问</span>
    <span class="badge">豆包</span>
  </div>

  <div class="accent-line bottom"></div>
  <div class="bottom-text">本科生/研究生 · 学术论文全流程指南</div>
</div>
</body>
</html>
